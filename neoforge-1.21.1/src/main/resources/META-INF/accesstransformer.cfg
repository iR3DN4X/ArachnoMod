# Access Transformers for ArachnoMod (NeoForge 1.21.1, Mojang official mappings).
#
# The Display entity stores its transform / interpolation / block-state in PRIVATE
# setters that write SynchedEntityData. Because we drive these displays from server
# code (not from a /summon NBT blob like the original plugin did), we widen them to
# public. If a future mapping makes one of these already-public, just delete that
# line (a redundant AT line is a build error).

public net.minecraft.world.entity.Display setTransformation(Lcom/mojang/math/Transformation;)V
public net.minecraft.world.entity.Display$BlockDisplay setBlockState(Lnet/minecraft/world/level/block/state/BlockState;)V

# Transform interpolation setters (smooth the per-tick animation, fixing the 20 Hz jitter).
# NOTE: renamed vs 1.20.1 — 1.20.2+ calls them setTransformationInterpolation*.
public net.minecraft.world.entity.Display setTransformationInterpolationDuration(I)V
public net.minecraft.world.entity.Display setTransformationInterpolationDelay(I)V

# View range setter (parked-ahead entities must never be distance-culled while on screen).
public net.minecraft.world.entity.Display setViewRange(F)V
