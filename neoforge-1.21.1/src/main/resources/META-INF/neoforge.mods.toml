[[mods]]
modId = "arachnomod"
version = "1.2.5"
displayName = "ArachnoMod (Spider Animation)"
authors = "iR3DN4X"
credits = "Based on TheCymaera/minecraft-spider"
description = '''
A giant, procedurally-animated spider that stalks players. One roams the world at a time,
returning two Minecraft days after each defeat. It hunts the nearest player within 64 blocks - towering over
the trees and charging in at incredible speed the further away you are, then shrinking down
as it closes in for a 6-heart bite. Built on FABRIK inverse-kinematics legs drawn with vanilla
BlockDisplay entities.

Created by iR3DN4X. Based on TheCymaera/minecraft-spider.
'''

