# Access Transformers for ArachnoMod (MinecraftForge 1.20.1).
# The Display entity stores its transform / block-state in PRIVATE setters that write
# SynchedEntityData. We drive these displays from server code, so we widen them to public.
# NOTE: Forge 1.20.1 applies ATs at the SRG layer, so methods use SRG names (m_NNNNN_), unlike
# the NeoForge 1.21.1 version which used the official names. Forge's AT parser also rejects bare
# "#" comment lines, so every comment line here has text.
# SRG names for 1.20.1:  Display.setTransformation = m_269214_ ; BlockDisplay.setBlockState = m_269329_
public net.minecraft.world.entity.Display m_269214_(Lcom/mojang/math/Transformation;)V
public net.minecraft.world.entity.Display$BlockDisplay m_269329_(Lnet/minecraft/world/level/block/state/BlockState;)V
# Transform interpolation setters (smooth the per-tick animation, fixing the 20 Hz jitter):
# Display.setInterpolationDuration = m_269317_ ; Display.setInterpolationDelay = m_276345_
public net.minecraft.world.entity.Display m_269317_(I)V
public net.minecraft.world.entity.Display m_276345_(I)V
# View range setter (parked-ahead entities must never be distance-culled): setViewRange = m_269215_
public net.minecraft.world.entity.Display m_269215_(F)V
